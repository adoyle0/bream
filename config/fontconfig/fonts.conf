<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Default fonts -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>CommitMono Nerd Font Mono</family>
     </prefer>
  </alias>
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>NotoSans NF</family>
     </prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer>
      <family>NotoSerif NF</family>
     </prefer>
  </alias>
  <alias>
    <family>icon</family>
    <prefer>
      <family>Font Awesome 6 Free</family>
     </prefer>
  </alias>
</fontconfig>
